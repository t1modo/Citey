<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&amp;display=swap');
    </style>

    <!-- Radial gradient: brightest at the spine, dims toward the tips -->
    <radialGradient id="fill" cx="25%" cy="50%" r="75%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#b0b0b0"/>
    </radialGradient>

    <!-- Soft white glow for dark backgrounds -->
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Ambient glow layer -->
  <text
    x="100" y="158"
    text-anchor="middle"
    font-family="'Dancing Script', 'Segoe Script', 'Monotype Corsiva', cursive"
    font-size="168"
    font-weight="bold"
    fill="white"
    fill-opacity="0.18"
    filter="url(#glow)"
  >C</text>

  <!-- Main letter -->
  <text
    x="100" y="158"
    text-anchor="middle"
    font-family="'Dancing Script', 'Segoe Script', 'Monotype Corsiva', cursive"
    font-size="168"
    font-weight="bold"
    fill="url(#fill)"
  >C</text>
</svg>
