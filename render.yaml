services:
  - type: web
    name: citey-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false          # you'll paste this in the Render dashboard
      - key: RESEND_API_KEY
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: EMAIL_FROM_ADDRESS
        value: notifications@citey.app
      - key: EMAIL_FROM_NAME
        value: Citey
      - key: APP_NAME
        value: Citey
      - key: APP_URL
        sync: false          # set after you know your Vercel URL
      - key: SUPPORT_EMAIL
        value: support@citey.app
      - key: SCHEDULER_INTERVAL_HOURS
        value: "24"
      - key: ALLOWED_ORIGINS
        sync: false          # set to your Vercel URL after deploy

  - type: cron
    name: citey-cron
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    schedule: "0 8 * * *"   # 08:00 UTC daily — adjust as you like
    startCommand: >
      python -c "
      import httpx, os;
      r = httpx.post(
        'https://citey-api.onrender.com/jobs/run',
        headers={'X-Cron-Secret': os.environ['CRON_SECRET']},
        timeout=300
      );
      print(r.status_code, r.text)
      "
    envVars:
      - key: CRON_SECRET
        sync: false
